<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0A1628;
    --navy-dark: #04060D;
    --red: #FF2D2D;
    --cyan: #00E5FF;
    --orange: #FF6B35;
    --steel: #C9D1D9;
    --muted: #4A5568;
    --border: rgba(255,255,255,0.06);
    --sans: 'Inter', system-ui, -apple-system, Helvetica Neue, Arial, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Courier New', monospace;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--navy); color: var(--steel); font-family: var(--sans); font-size: 16px; line-height: 1.7; overflow-x: hidden; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1rem 3rem; background: rgba(10,22,40,0.92); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); }
  .nav-logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
  .nav-logo img { height: 40px; width: auto; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-size: 13px; font-weight: 500; color: var(--muted); text-decoration: none; letter-spacing: 0.04em; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--steel); }
  .nav-cta { font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--navy); background: var(--cyan); border: none; padding: 0.6rem 1.5rem; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
  .nav-cta:hover { opacity: 0.85; }

  .page-header { padding: 9rem 3rem 4rem; border-bottom: 1px solid var(--border); background: var(--navy-dark); }
  .page-tag { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--cyan); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; }
  .page-tag::before { content: ''; display: block; width: 2rem; height: 1px; background: var(--cyan); }
  .page-header h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; color: #fff; line-height: 1.1; margin-bottom: 1rem; }
  .page-header h1 span { color: var(--cyan); }
  .page-header p { color: var(--muted); max-width: 540px; font-weight: 400; font-size: 1.05rem; }

  .filter-bar { padding: 1.25rem 3rem; border-bottom: 1px solid var(--border); display: flex; gap: 0.5rem; flex-wrap: wrap; background: rgba(255,255,255,0.02); }
  .filter-btn { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); background: transparent; border: 1px solid var(--border); padding: 0.4rem 1rem; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover, .filter-btn.active { color: var(--navy); border-color: var(--cyan); background: var(--cyan); }

  .blog-layout { display: grid; grid-template-columns: 1fr 300px; width: 100%; max-width: 1280px; margin: 0 auto; }

  .post-list { border-right: 1px solid var(--border); min-width: 0; }
  .post-item { padding: 2.5rem 3rem; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr auto; gap: 2rem; align-items: start; transition: background 0.2s; min-width: 0; }
  .post-item:hover { background: rgba(0,229,255,0.02); }
  .post-item:target { background: rgba(0,229,255,0.04); border-left: 2px solid var(--cyan); padding-left: calc(3rem - 2px); }

  .post-meta { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .post-cat { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--navy); background: var(--cyan); padding: 0.15rem 0.5rem; }
  .post-date { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .post-read-time { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  .post-item h2 { font-size: 1.1rem; font-weight: 700; line-height: 1.3; margin-bottom: 0.75rem; color: #fff; }
  .post-excerpt { font-size: 14px; color: var(--muted); line-height: 1.8; margin-bottom: 1.25rem; max-width: 620px; }

  .post-body { display: none; }
  .post-body.expanded { display: block; }
  .post-body p { font-size: 15px; color: var(--steel); line-height: 1.85; margin-bottom: 1.25rem; max-width: 680px; }
  .post-body h3 { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--cyan); margin: 2rem 0 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .post-body ul { padding-left: 1.5rem; margin-bottom: 1.25rem; }
  .post-body ul li { font-size: 15px; color: var(--muted); line-height: 1.8; margin-bottom: 0.4rem; }
  .post-body .callout { background: rgba(255,45,45,0.06); border-left: 2px solid var(--red); padding: 1rem 1.25rem; margin: 1.5rem 0; font-size: 14px; color: var(--steel); font-style: italic; }

  .read-toggle { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--navy); background: var(--cyan); border: none; padding: 0.45rem 1rem; cursor: pointer; transition: opacity 0.2s; display: inline-block; }
  .read-toggle:hover { opacity: 0.85; }

  .post-number { font-family: var(--mono); font-size: 3rem; font-weight: 700; color: rgba(255,255,255,0.06); line-height: 1; padding-top: 0.25rem; user-select: none; }

  .sidebar { padding: 2.5rem 2rem; position: sticky; top: 5rem; align-self: start; min-width: 0; }
  .sidebar-label { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .sidebar-section { margin-bottom: 2.5rem; }
  .sidebar-links { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .sidebar-links a { font-size: 13px; color: var(--muted); text-decoration: none; line-height: 1.4; transition: color 0.2s; display: block; padding: 0.35rem 0; border-bottom: 1px solid transparent; }
  .sidebar-links a:hover { color: var(--steel); }
  .tag-cloud { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .tag { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); border: 1px solid var(--border); padding: 0.2rem 0.6rem; cursor: pointer; transition: all 0.2s; }
  .tag:hover { color: var(--navy); background: var(--cyan); border-color: var(--cyan); }
  .cta-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 1.5rem; }
  .cta-box h4 { font-size: 0.9rem; font-weight: 700; color: #fff; margin-bottom: 0.75rem; line-height: 1.35; }
  .cta-box p { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.7; }
  .btn-primary { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--navy); background: var(--cyan); border: none; padding: 0.7rem 1.25rem; cursor: pointer; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.85; }

  footer { padding: 2rem 3rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .footer-left { display: flex; align-items: center; gap: 1.25rem; }
  .footer-logo-img { height: 32px; width: auto; }
  .footer-tagline { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
  .footer-right { font-size: 12px; color: var(--muted); }

  @media (max-width: 1100px) {
    .blog-layout { grid-template-columns: 1fr 240px; }
    .post-item { padding: 2rem 1.5rem; }
  }
  @media (max-width: 900px) {
    .blog-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .post-item { grid-template-columns: 1fr; padding: 2rem 1.5rem; }
    .post-number { display: none; }
    nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
    .hamburger { display: flex; }
    .page-header, .filter-bar { padding-left: 1.5rem; padding-right: 1.5rem; }
    footer { flex-direction: column; }
  }
  @media (max-width: 480px) {
    .page-header { padding: 6rem 1rem 2rem; }
    .filter-bar { padding-left: 1rem; padding-right: 1rem; }
  }
</style>
